services:
  - type: web
    name: ksp-crime-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OLLAMA_HOST
        value: http://localhost:11434
      - key: ALLOWED_ORIGINS
        value: https://kspdatathon06.vercel.app
