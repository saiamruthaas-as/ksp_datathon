<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-base" content="https://breeze-ascertain-unwind.ngrok-free.dev">
    <title>KSP Crime Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                        <path d="M12 6v6h6"/>
                    </svg>
                    <h1>KSP Crime Assistant</h1>
                </div>
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text" id="statusText" data-i18n="ready">Ready</span>
                </div>
                <div class="language-control">
                    <label for="languageSelector" data-i18n="language_label">Language</label>
                    <select id="languageSelector" class="language-select">
                        <option value="en">English</option>
                        <option value="hi">हिन्दी</option>
                        <option value="kn">ಕನ್ನಡ</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div class="chat-container">
                <!-- Messages Area -->
                <div class="messages" id="messages">
                    <div class="message system">
                        <div class="message-content">
                            <p id="welcomeText" data-i18n="welcome">Welcome to the KSP Crime Assistant. Submit inquiries on crime policy and reporting.</p>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <form id="queryForm" class="query-form">
                        <div class="input-wrapper">
                            <input
                                type="text"
                                id="queryInput"
                                class="query-input"
                                placeholder="Enter your inquiry regarding crime policy or reporting procedures."
                                data-placeholder-i18n="query_placeholder"
                                autocomplete="off"
                            >
                            <button type="button" class="record-button" id="recordBtn" title="Start voice input">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 1.75a2.75 2.75 0 0 0-2.75 2.75v5.5a2.75 2.75 0 0 0 5.5 0v-5.5A2.75 2.75 0 0 0 12 1.75z"></path>
                                    <path d="M19 10.25a7 7 0 0 1-14 0"></path>
                                    <path d="M12 18.25v3"></path>
                                    <path d="M8 22.25h8"></path>
                                </svg>
                            </button>
                            <button type="submit" class="send-button" id="sendBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </form>
                    <div class="suggestions">
                        <button class="suggestion-chip" data-i18n="suggestion_theft" onclick="setQuery('What is theft?')">What is theft?</button>
                        <button class="suggestion-chip" data-i18n="suggestion_types" onclick="setQuery('Show me crime types')">Crime types</button>
                        <button class="suggestion-chip" data-i18n="suggestion_assault" onclick="setQuery('What is assault?')">What is assault?</button>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-title" data-i18n="chat_history_title">Chat History</h3>
                    <div id="historyList" class="history-panel">
                        <div class="history-item empty" data-i18n="no_history">No questions recorded yet.</div>
                    </div>
                </div>
                <div class="sidebar-section">
                    <h3 class="sidebar-title" data-i18n="faq_title">FAQ</h3>
                    <div id="faqPanel" class="faq-panel">
                        <button class="faq-item" data-i18n="faq_fir" onclick="setQuery('How do I draft an FIR?')">How do I draft an FIR?</button>
                        <button class="faq-item" data-i18n="faq_theft" onclick="setQuery('What should I do after a theft?')">What should I do after a theft?</button>
                        <button class="faq-item" data-i18n="faq_assault" onclick="setQuery('How can I report an assault?')">How can I report an assault?</button>
                        <button class="faq-item" data-i18n="faq_evidence" onclick="setQuery('What evidence should I collect for a complaint?')">What evidence should I collect for a complaint?</button>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3 class="sidebar-title" data-i18n="actions_title">Actions</h3>
                    <button id="clearBtn" class="action-button" data-i18n="clear_chat" onclick="clearChat()">Clear Chat</button>
                </div>
            </aside>
        </main>
    </div>

    <!-- Loading Indicator -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>Thinking...</p>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
